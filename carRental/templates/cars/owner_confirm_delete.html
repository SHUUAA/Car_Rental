{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width:520px">
  <div class="card border-danger">
    <div class="card-body">
      <h4 class="text-danger">Delete this car?</h4>
      <p>You are about to delete <strong>{{ car.display_name }}</strong> ({{ car.license_plate }}). This cannot be undone.</p>
      <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Yes, delete</button>
        <a class="btn btn-outline-dark" href="{% url 'cars:owner_cars' %}">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
